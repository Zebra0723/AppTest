<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nebula Notes — Demo</title>
  <meta name="description" content="A tiny demo app used to exercise the VercelCheck bot.">
  <!-- NOTE: intentionally NO viewport meta tag to trigger a responsive finding -->
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; color: #111; }
    h1 { margin-top: 0; }
    /* This block is deliberately wider than a phone screen -> horizontal overflow bug */
    .too-wide { width: 1600px; height: 40px; background: linear-gradient(90deg,#6366f1,#ec4899); border-radius: 8px; margin: 16px 0; }
    .spinner { width: 28px; height: 28px; border: 4px solid #ddd; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card { border: 1px solid #eee; border-radius: 10px; padding: 16px; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>Nebula Notes</h1>
  <p>Welcome to Nebula Notes — capture your thoughts among the stars.</p>

  <div class="card">
    <label for="q">Search notes</label>
    <input id="q" type="search" placeholder="Search your notes...">
  </div>

  <div class="card">
    <button>New note</button>
    <button aria-label="Toggle dark mode">🌙</button>
  </div>

  <!-- broken image: file does not exist -> should be flagged -->
  <img src="/assets/hero-that-does-not-exist.png" width="200" height="120">

  <!-- overflow offender -->
  <div class="too-wide"></div>

  <!-- a loader that never resolves -> stuck spinner finding -->
  <div class="card">
    <p>Loading your latest notes…</p>
    <div class="spinner" aria-label="loading"></div>
  </div>

  <script>
    // Intentional console error + a failing fetch to exercise the bot.
    console.error("Demo: failed to initialise sync engine (offline)");
    fetch("/api/notes-endpoint-that-404s").catch(function(){});
  </script>
</body>
</html>
