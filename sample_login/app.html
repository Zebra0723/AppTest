<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nebula Notes</title>
<style>
  body{font-family:system-ui,sans-serif;margin:0;padding:24px;color:#111}
  h1{margin-top:0}
  .card{border:1px solid #eee;border-radius:10px;padding:16px;margin:12px 0}
  .gate{display:grid;place-items:center;height:80vh;color:#888;text-align:center}
</style>
</head>
<body>
  <div id="app" style="display:none">
    <h1>Nebula Notes</h1>
    <p>Welcome back — your private notes, among the stars.</p>
    <div class="card">
      <label for="q">Search notes</label>
      <input id="q" type="search" placeholder="Search your notes..." />
    </div>
    <div class="card">
      <button>New note</button>
      <button aria-label="Toggle dark mode">🌙</button>
      <button>Export to PDF</button>
    </div>
    <div class="card">
      <h3>Recent notes</h3>
      <ul><li>Trip to Andromeda</li><li>Rocket fuel shopping list</li><li>Ideas for the observatory</li></ul>
    </div>
  </div>
  <div id="gate" class="gate">
    <div><h2>🔒 Please sign in</h2><p>You need to be signed in to view your notes.</p></div>
  </div>
  <script>
    // Simulates a session gate: only shows the app if "logged in".
    if (localStorage.getItem('authed') === '1') {
      document.getElementById('app').style.display = 'block';
      document.getElementById('gate').style.display = 'none';
    }
  </script>
</body>
</html>
